name: Fluxer Tracker
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  real_time_only:
    runs-on: ubuntu-latest
    steps:
      - name: Kill the Past - Scan Today Only
        run: |
          # 1. Obtenemos el evento más reciente
          EVENT_DATA=$(curl -s "https://api.github.com/repos/fluxerapp/fluxer/events?per_page=1")
          EVENT_DATE=$(echo $EVENT_DATA | jq -r '.[0].created_at')
          
          # 2. Convertimos fechas a segundos para comparar
          EVENT_SEC=$(date -d "$EVENT_DATE" +%s)
          NOW_SEC=$(date +%s)
          DIFF=$((NOW_SEC - EVENT_SEC))

          # 3. SOLO SI PASÓ EN LAS ÚLTIMAS 24 HORAS (86400 segundos)
          if [ $DIFF -lt 86400 ]; then
            COMMIT_MSG=$(echo $EVENT_DATA | jq -r '.[0].payload.commits[0].message')
            COMMIT_URL="https://github.com/fluxerapp/fluxer/commit/$(echo $EVENT_DATA | jq -r '.[0].payload.commits[0].sha')"
            AUTHOR=$(echo $EVENT_DATA | jq -r '.[0].actor.login')

            KEYWORDS="limit|chat|audio|voice|call|quality|bitrate|video|ui|theme|css|style|color|icon|font|button|profile|avatar|banner|badge|premium|plutonium|store|shop|server|role|channel|social|hosting|api|db|android|pc|desktop|version|add|new|implement"

            if echo "$COMMIT_MSG" | grep -Ei "$KEYWORDS"; then
              curl -X POST -H "Content-Type: application/json" -d "{\"content\": \"🚀 **NOVEDAD DE ÚLTIMA HORA**\n\n**Cambio:** $COMMIT_MSG\n**Autor:** $AUTHOR\n\n🔗 **Evidencia:** $COMMIT_URL\"}" https://api.fluxer.app/webhooks/1486111355110249985/4B1moaCXGLLyY0z632AnoiqhZhwiuLfsSlvT58Ez83F01Tb0QFAnrQfnI08VxizT
            fi
          else
            echo "El último cambio es muy viejo ($EVENT_DATE). Ignorando para evitar spam de febrero."
          fi

      - name: Future Radar (Pull Requests)
        run: |
          PR_DATA=$(curl -s "https://api.github.com/repos/fluxerapp/fluxer/pulls?state=open&sort=created&direction=desc&per_page=1" | jq -r '.[0]')
          PR_DATE=$(echo $PR_DATA | jq -r '.created_at')
          PR_SEC=$(date -d "$PR_DATE" +%s)
          NOW_SEC=$(date +%s)
          DIFF=$((NOW_SEC - PR_SEC))

          # Solo si la propuesta se creó o actualizó hace menos de 48 horas
          if [ $DIFF -lt 172800 ]; then
            PR_TITLE=$(echo $PR_DATA | jq -r '.title')
            PR_URL=$(echo $PR_DATA | jq -r '.html_url')
            curl -X POST -H "Content-Type: application/json" -d "{\"content\": \"✨ **NUEVO PROYECTO DETECTADO**\n\n**Función:** $PR_TITLE\n\n🛠️ **Seguimiento:** $PR_URL\"}" https://api.fluxer.app/webhooks/1486111355110249985/4B1moaCXGLLyY0z632AnoiqhZhwiuLfsSlvT58Ez83F01Tb0QFAnrQfnI08VxizT
          fi
