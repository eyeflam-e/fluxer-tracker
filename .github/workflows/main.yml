name: Fluxer Tracker
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  precision_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Get Latest Activity
        run: |
          # 1. Forzamos que traiga el ULTIMO commit de la rama MAIN específicamente
          DATA=$(curl -s "https://api.github.com/repos/fluxerapp/fluxer/commits?sha=main&per_page=1")
          MESSAGE=$(echo $DATA | jq -r '.[0].commit.message')
          URL=$(echo $DATA | jq -r '.[0].html_url')
          AUTHOR=$(echo $DATA | jq -r '.[0].commit.author.name')
          DATE=$(echo $DATA | jq -r '.[0].commit.author.date')

          # 2. FILTRO DE RELEVANCIA ABSOLUTA
          KEYWORDS="limit|chat|audio|voice|call|quality|bitrate|video|ui|theme|css|style|color|icon|font|button|profile|avatar|banner|badge|premium|plutonium|store|shop|server|role|channel|social|hosting|api|db|android|pc|desktop|version|add|new|implement"

          if echo "$MESSAGE" | grep -Ei "$KEYWORDS"; then
            # Convertimos la fecha a algo legible
            DETECTED_AT=$(date +"%d/%m/%Y %H:%M")

            curl -X POST -H "Content-Type: application/json" \
            -d "{
              \"content\": \"🔍 **MOVIMIENTO DETECTADO EN TIEMPO REAL**\n\n**Cambio:** $MESSAGE\n**Fecha original:** $DATE\n**Detectado por el bot:** $DETECTED_AT\n\n🔗 **Evidencia:** $URL\"
            }" \
            https://api.fluxer.app/webhooks/1486111355110249985/4B1moaCXGLLyY0z632AnoiqhZhwiuLfsSlvT58Ez83F01Tb0QFAnrQfnI08VxizT
          fi

      - name: Real-Time Future Radar
        run: |
          # Traemos solo el Pull Request más reciente que esté ABIERTO ahora mismo
          PR_DATA=$(curl -s "https://api.github.com/repos/fluxerapp/fluxer/pulls?state=open&sort=created&direction=desc&per_page=1" | jq -r '.[0]')
          PR_TITLE=$(echo $PR_DATA | jq -r '.title')
          PR_URL=$(echo $PR_DATA | jq -r '.html_url')

          if [ "$PR_TITLE" != "null" ]; then
            curl -X POST -H "Content-Type: application/json" \
            -d "{
              \"content\": \"✨ **NUEVA FUNCIÓN PROPUESTA (MARZO 2026)**\n\n**Título:** $PR_TITLE\n**Link de seguimiento:** $PR_URL\"
            }" \
            https://api.fluxer.app/webhooks/1486111355110249985/4B1moaCXGLLyY0z632AnoiqhZhwiuLfsSlvT58Ez83F01Tb0QFAnrQfnI08VxizT
          fi
